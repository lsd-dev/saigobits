<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SaigoBits project showcase and case studies. Detailed technical solutions, custom development, and IT consulting outcomes.">
    <title>Projects Showcase | SaigoBits</title>
    <link rel="stylesheet" href="style.css?v=1.6">
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <!-- Load Web Components -->
    <script src="components/Navbar.js" defer></script>
    <script src="components/Footer.js" defer></script>
</head>
<body>

    <!-- Top google-style divider line -->
    <div class="google-divider"></div>

    <!-- Sticky Header / Navbar -->
    <site-header></site-header>

    <main id="main-content">
        <section class="section-padding section-bg-alt" style="border-top: none;">
            <div class="container">
                <div class="breadcrumbs">
                    <a href="index.html">Home</a> &gt; <span id="breadcrumb-current">Projects</span>
                </div>
                
                <div class="section-header" style="text-align: left; margin-left: 0; max-width: 100%; margin-bottom: 40px;">
                    <span class="lead-space-tagline" id="category-tagline">Showcase</span>
                    <h1 id="category-title" style="font-size: 2.5rem; margin-top: 10px; margin-bottom: 16px;">Loading Projects...</h1>
                    <p id="category-description" style="font-size: 1.15rem; max-width: 800px; line-height: 1.6;"></p>
                </div>
                
                <!-- Loading State Spinner -->
                <div id="projects-loading" class="spinner-container">
                    <div class="loading-spinner"></div>
                </div>

                <!-- Error State -->
                <div id="projects-error" class="error-container" style="display: none;">
                    <h3>Oops! Category not found.</h3>
                    <p>We couldn't load the projects for this category. Please go back to the homepage and select another portfolio section.</p>
                    <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">Back to Home</a>
                </div>

                <!-- Projects List Container -->
                <div id="projects-list-container" class="projects-list-wrapper" style="display: none;">
                    <!-- Dynamically loaded project cards will appear here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <site-footer></site-footer>

    <script src="script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProjectsData();
        });

        async function loadProjectsData() {
            const params = new URLSearchParams(window.location.search);
            const categoryId = params.get('category');
            
            const titleEl = document.getElementById('category-title');
            const descEl = document.getElementById('category-description');
            const taglineEl = document.getElementById('category-tagline');
            const breadcrumbEl = document.getElementById('breadcrumb-current');
            
            const loadingEl = document.getElementById('projects-loading');
            const errorEl = document.getElementById('projects-error');
            const listContainerEl = document.getElementById('projects-list-container');
            
            if (!categoryId) {
                showError();
                return;
            }

            try {
                const response = await fetch('projects/projects.json');
                if (!response.ok) throw new Error('Failed to fetch project database');
                
                const data = await response.json();
                const category = data.categories[categoryId];
                
                if (!category) {
                    showError();
                    return;
                }

                // Set Header Information
                titleEl.textContent = category.title;
                descEl.textContent = category.description;
                taglineEl.textContent = category.subtitle;
                breadcrumbEl.textContent = category.title;
                document.title = `${category.title} | SaigoBits`;

                // Filter projects belonging to this category
                const categoryProjects = data.projects.filter(p => p.category === categoryId);
                
                if (categoryProjects.length === 0) {
                    listContainerEl.innerHTML = '<p class="no-projects-msg">No projects listed under this category yet. Check back soon!</p>';
                } else {
                    renderProjects(categoryProjects, listContainerEl);
                }

                // Toggle visibility
                loadingEl.style.display = 'none';
                listContainerEl.style.display = 'block';
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function showError() {
            document.getElementById('projects-loading').style.display = 'none';
            document.getElementById('projects-error').style.display = 'block';
            document.getElementById('category-title').textContent = 'Error';
            document.getElementById('category-description').textContent = '';
        }

        function renderProjects(projects, container) {
            container.innerHTML = '';
            
            projects.forEach((proj, idx) => {
                const card = document.createElement('article');
                card.className = 'project-detail-card';
                card.id = `project-detail-${idx + 1}`;
                
                // Construct client verification section
                let clientHTML = '';
                if (proj.client) {
                    const hasLinkedIn = proj.client.linkedin && proj.client.linkedin !== '#';
                    clientHTML = `
                        <div class="project-client-info">
                            <span class="client-label">Consulted Client:</span>
                            <span class="client-name">${proj.client.name}</span>
                            ${proj.client.title ? `<span class="client-title">${proj.client.title}</span>` : ''}
                            ${hasLinkedIn ? `
                                <a href="${proj.client.linkedin}" target="_blank" rel="noopener noreferrer" class="linkedin-badge" aria-label="Verify ${proj.client.name} on LinkedIn">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                        <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                                    </svg>
                                    Verify Profile
                                </a>
                            ` : ''}
                        </div>
                    `;
                }

                // Construct live demo button if demoPath is set
                let demoHTML = '';
                if (proj.demoPath) {
                    demoHTML = `
                        <div class="project-demo-action">
                            <a href="${encodeURI(proj.demoPath)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary demo-btn">
                                Launch Live Demo
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-left: 6px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </a>
                        </div>
                    `;
                }

                // Construct feedback section
                let feedbackHTML = '';
                if (proj.feedback) {
                    feedbackHTML = `
                        <div class="project-feedback-wrapper">
                            <span class="feedback-label">Client Feedback:</span>
                            <blockquote class="client-quote">
                                "${proj.feedback}"
                            </blockquote>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="project-detail-main">
                        <div class="project-detail-header">
                            <h2>${proj.title}</h2>
                            <span class="project-number-badge">Case #${idx + 1}</span>
                        </div>
                        
                        <div class="project-detail-body">
                            <div class="project-detail-section">
                                <h4 class="label-challenge">Challenge</h4>
                                <p>${proj.challenge}</p>
                            </div>
                            
                            <div class="project-detail-section">
                                <h4 class="label-solution">Solution & Strategy</h4>
                                <p>${proj.solution}</p>
                            </div>
                            
                            <div class="project-detail-section">
                                <h4 class="label-outcome">Outcome & Impact</h4>
                                <p>${proj.outcome}</p>
                            </div>
                        </div>
                        
                        <div class="project-detail-footer">
                            ${clientHTML}
                            ${demoHTML}
                            ${feedbackHTML}
                        </div>
                    </div>
                    <div class="project-detail-visual">
                        ${getProjectVisual(proj.id)}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function getProjectVisual(projId) {
            const svgAttrs = 'viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"';
            
            switch (projId) {
                case 'ca-firm-template':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-ca" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#efecff"/>
                                    <stop offset="100%" stop-color="#e0dbff"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-ca)"/>
                            <rect x="40" y="110" width="24" height="50" rx="4" fill="#7d5fff"/>
                            <rect x="74" y="80" width="24" height="80" rx="4" fill="#6c5ce7"/>
                            <rect x="108" y="95" width="24" height="65" rx="4" fill="#ffd35c"/>
                            <rect x="142" y="60" width="24" height="100" rx="4" fill="#55efc4"/>
                            <path d="M52 100 L86 70 L120 85 L154 50" fill="none" stroke="#202124" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="154" cy="50" r="5" fill="#f78fb3" stroke="#202124" stroke-width="2"/>
                        </svg>
                    `;
                case 'iw-associates-template':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-iw" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fff0f5"/>
                                    <stop offset="100%" stop-color="#ffd5e5"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-iw)"/>
                            <path d="M100 45 L150 65 V115 C150 145 125 165 100 170 C75 165 50 145 50 115 V65 L100 45 Z" fill="#f78fb3" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <path d="M75 105 L93 123 L125 85" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    `;
                case 'coaching-template':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-coach" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ebfbf5"/>
                                    <stop offset="100%" stop-color="#cbf3e5"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-coach)"/>
                            <path d="M100 60 L160 85 L100 110 L40 85 Z" fill="#55efc4" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <rect x="80" y="110" width="40" height="25" fill="#202124" rx="2"/>
                            <path d="M100 110 V140 C100 150 120 150 120 140" fill="none" stroke="#ffd35c" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="160" cy="85" r="4" fill="#ffd35c"/>
                        </svg>
                    `;
                case 'real-estate-template':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-re" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fffcf0"/>
                                    <stop offset="100%" stop-color="#fff3cc"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-re)"/>
                            <path d="M60 140 V90 L100 60 L140 90 V140 Z" fill="#ffd35c" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <rect x="85" y="105" width="30" height="35" rx="3" fill="#202124"/>
                            <circle cx="93" cy="122" r="2" fill="#ffffff"/>
                            <circle cx="100" cy="45" r="8" fill="#f78fb3"/>
                        </svg>
                    `;
                case 'probox-template':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-probox" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#efecff"/>
                                    <stop offset="100%" stop-color="#e0dbff"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-probox)"/>
                            <rect x="40" y="50" width="120" height="100" rx="8" fill="#ffffff" stroke="#202124" stroke-width="3"/>
                            <line x1="100" y1="50" x2="100" y2="150" stroke="#202124" stroke-width="2" stroke-dasharray="4 4"/>
                            <circle cx="70" cy="100" r="4" fill="#7d5fff"/>
                            <circle cx="130" cy="100" r="4" fill="#55efc4"/>
                            <path d="M90 70 H110 M90 130 H110" stroke="#202124" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    `;
                case 'ubuntu-setup':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-ubuntu" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ffecd2"/>
                                    <stop offset="100%" stop-color="#fcb69f"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-ubuntu)"/>
                            
                            <!-- Feet -->
                            <ellipse cx="75" cy="160" rx="18" ry="8" fill="#ffd35c" stroke="#202124" stroke-width="2"/>
                            <ellipse cx="125" cy="160" rx="18" ry="8" fill="#ffd35c" stroke="#202124" stroke-width="2"/>
                            
                            <!-- Flippers -->
                            <ellipse cx="50" cy="120" rx="12" ry="30" transform="rotate(-20 50 120)" fill="#202124"/>
                            <ellipse cx="150" cy="120" rx="12" ry="30" transform="rotate(20 150 120)" fill="#202124"/>
                            
                            <!-- Body -->
                            <ellipse cx="100" cy="115" rx="48" ry="52" fill="#202124" stroke="#202124" stroke-width="2"/>
                            
                            <!-- White Tummy -->
                            <ellipse cx="100" cy="125" rx="34" ry="38" fill="#ffffff"/>
                            
                            <!-- Ubuntu Logo on Chest -->
                            <circle cx="100" cy="125" r="14" fill="none" stroke="#fc8151" stroke-width="3"/>
                            <circle cx="100" cy="111" r="3.5" fill="#fc8151"/>
                            <circle cx="88" cy="132" r="3.5" fill="#fc8151"/>
                            <circle cx="112" cy="132" r="3.5" fill="#fc8151"/>
                            
                            <!-- Eyes Backing -->
                            <ellipse cx="85" cy="80" rx="14" ry="16" fill="#ffffff"/>
                            <ellipse cx="115" cy="80" rx="14" ry="16" fill="#ffffff"/>
                            
                            <!-- Pupils -->
                            <circle cx="85" cy="80" r="6" fill="#202124"/>
                            <circle cx="115" cy="80" r="6" fill="#202124"/>
                            <circle cx="83" cy="77" r="2" fill="#ffffff"/>
                            <circle cx="113" cy="77" r="2" fill="#ffffff"/>
                            
                            <!-- Beak -->
                            <path d="M90 90 Q100 102 110 90 Z" fill="#ffd35c" stroke="#202124" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                    `;
                case 'retro-gaming-setup':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-retro" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#efecff"/>
                                    <stop offset="100%" stop-color="#e0dbff"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-retro)"/>
                            <rect x="40" y="70" width="120" height="60" rx="20" fill="#7d5fff" stroke="#202124" stroke-width="3"/>
                            <path d="M60 100 H80 M70 90 V110" stroke="#202124" stroke-width="4" stroke-linecap="round"/>
                            <circle cx="125" cy="95" r="7" fill="#ffd35c" stroke="#202124" stroke-width="2"/>
                            <circle cx="140" cy="105" r="7" fill="#f78fb3" stroke="#202124" stroke-width="2"/>
                            <path d="M100 52 L95 47 H90 V52 L100 62 L110 52 V47 H105 Z" fill="#f78fb3" stroke="#202124" stroke-width="1.5"/>
                        </svg>
                    `;
                case 'iit-pathway-advisory':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-iit" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ebfbf5"/>
                                    <stop offset="100%" stop-color="#cbf3e5"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-iit)"/>
                            <path d="M100 160 V120 C100 100 60 90 60 70 V40" fill="none" stroke="#202124" stroke-width="3" stroke-dasharray="2 2"/>
                            <path d="M100 160 V120 C100 100 140 90 140 70 V40" fill="none" stroke="#55efc4" stroke-width="3"/>
                            <circle cx="100" cy="160" r="6" fill="#202124"/>
                            <circle cx="140" cy="40" r="10" fill="#55efc4" stroke="#202124" stroke-width="2"/>
                            <path d="M135 40 L138 43 L145 36" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="60" cy="40" r="10" fill="#202124"/>
                            <text x="56" y="44" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">M</text>
                        </svg>
                    `;
                case 'evertz-placement-advisory':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-evertz" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fffcf0"/>
                                    <stop offset="100%" stop-color="#fff3cc"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-evertz)"/>
                            <line x1="100" y1="50" x2="60" y2="100" stroke="#202124" stroke-width="3"/>
                            <line x1="100" y1="50" x2="140" y2="100" stroke="#202124" stroke-width="3"/>
                            <line x1="60" y1="100" x2="40" y2="150" stroke="#202124" stroke-width="3"/>
                            <line x1="60" y1="100" x2="80" y2="150" stroke="#202124" stroke-width="3"/>
                            <circle cx="100" cy="50" r="14" fill="#ffd35c" stroke="#202124" stroke-width="3"/>
                            <circle cx="60" cy="100" r="14" fill="#f78fb3" stroke="#202124" stroke-width="3"/>
                            <circle cx="140" cy="100" r="14" fill="#55efc4" stroke="#202124" stroke-width="3"/>
                            <circle cx="40" cy="150" r="10" fill="#7d5fff" stroke="#202124" stroke-width="2"/>
                            <circle cx="80" cy="150" r="10" fill="#7d5fff" stroke="#202124" stroke-width="2"/>
                        </svg>
                    `;
                case 'hackathon-engineering-mentorship':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-hack" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#efecff"/>
                                    <stop offset="100%" stop-color="#e0dbff"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-hack)"/>
                            <path d="M60 60 H140 V90 C140 115 120 130 100 130 C80 130 60 115 60 90 Z" fill="#ffd35c" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <path d="M60 70 H45 V90 H60" fill="none" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <path d="M140 70 H155 V90 H140" fill="none" stroke="#202124" stroke-width="3" stroke-linejoin="round"/>
                            <rect x="75" y="130" width="50" height="25" rx="4" fill="#202124"/>
                            <polygon points="100,32 103,37 109,37 104,41 106,47 100,43 94,47 96,41 91,37 97,37" fill="#f78fb3"/>
                        </svg>
                    `;
                default:
                    return '';
            }
        }
    </script>
</body>
</html>
