<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SaigoBits project showcase and case studies. Detailed technical solutions, custom development, and IT consulting outcomes.">
    <title>Projects Showcase | SaigoBits</title>
    <link rel="stylesheet" href="style.css?v=1.7">
    <link rel="icon" type="image/png" href="images/logo.png">
    
    <!-- Load Web Components -->
    <script src="components/Navbar.js?v=1.1" defer></script>
    <script src="components/Footer.js?v=1.1" defer></script>
</head>
<body>

    <!-- Top google-style divider line -->
    <div class="google-divider"></div>

    <!-- Sticky Header / Navbar -->
    <site-header></site-header>

    <main id="main-content">
        <section class="section-padding section-bg-alt" style="border-top: none;">
            <div class="container">
                <div class="breadcrumbs">
                    <a href="index.html">Home</a> &gt; <span id="breadcrumb-current">Projects</span>
                </div>
                
                <div class="section-header" style="text-align: left; margin-left: 0; max-width: 100%; margin-bottom: 40px;">
                    <h1 id="category-title" style="font-size: 2.5rem; margin-top: 10px; margin-bottom: 16px;">Loading Projects...</h1>
                    <p id="category-description" style="font-size: 1.15rem; max-width: 800px; line-height: 1.6;"></p>
                </div>
                
                <!-- Category Highlights Panel -->
                <div class="category-hub-grid" id="category-hub" style="display: none; margin-bottom: 40px; grid-template-columns: 1fr;">
                    <div class="hub-info" style="border-right: none; width: 100%;">
                        <h3 class="hub-info-title">Key Highlights</h3>
                        <ul class="hub-highlights-list" id="hub-highlights">
                            <!-- Dynamic advantages will load here -->
                        </ul>
                    </div>
                </div>
                
                <!-- Loading State Spinner -->
                <div id="projects-loading" class="spinner-container">
                    <div class="loading-spinner"></div>
                </div>

                <!-- Error State -->
                <div id="projects-error" class="error-container" style="display: none;">
                    <h3>Oops! Category not found.</h3>
                    <p>We couldn't load the projects for this category. Please go back to the homepage and select another portfolio section.</p>
                    <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">Back to Home</a>
                </div>

                <!-- Main Showcase Wrapper -->
                <div id="showcase-content-wrapper" style="display: none;">
                    
                    <!-- Production Application Promo Banner -->
                    <div id="production-promo-container" style="display: none; margin-bottom: 40px;">
                        <div class="production-promo-card" id="production-promo-card">
                            <!-- Populated dynamically based on categoryId -->
                        </div>
                        <hr class="section-divider">
                    </div>

                    <!-- Templates / Cases Showcase Section -->
                    <div id="secondary-showcase-section">
                        <div class="secondary-section-header" style="margin-bottom: 24px;">
                            <h3 class="subpage-section-title" id="secondary-section-title" style="margin-bottom: 8px;">
                                <!-- Titled dynamically: "Premium Pre-Built Templates" or "Operational Case Studies" -->
                            </h3>
                            <p id="secondary-section-description" style="color: var(--color-text-secondary); font-size: 0.95rem; margin-bottom: 24px;"></p>
                        </div>

                        <!-- Search & Filter Controls -->
                        <div class="hub-controls" id="hub-controls" style="margin-bottom: 30px; display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px; align-items: center;">
                            <div class="search-box-wrapper" style="max-width: 480px; flex: 1; min-width: 250px; width: 100%;">
                                <span class="search-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                </span>
                                <input type="text" id="project-search-input" placeholder="Search..." aria-label="Search">
                            </div>
                            <div class="dropdown-select-wrapper" id="dropdown-select-container">
                                <select id="category-dropdown" class="category-select-dropdown" aria-label="Filter by subcategory">
                                    <!-- Dynamic options will load here -->
                                </select>
                            </div>
                        </div>

                        <div id="projects-list-container" class="projects-list-wrapper">
                            <!-- Dynamic template/case cards will load here -->
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <site-footer></site-footer>

    <script src="script.js"></script>
    
    <script>
        const CATEGORY_HIGHLIGHTS = {
            "production": [
                "<strong>Live Deployments:</strong> Real-world applications running in production environments with active campus and developer user bases.",
                "<strong>Domain Isolation:</strong> Programmatic institutional email restrictions and custom Google Auth verification patterns.",
                "<strong>Performance Rigging:</strong> Custom state reducers, D3 graph physics simulations, and optimized asset pipelines."
            ],
            "ui-ux": [
                "<strong>Production-Grade & Templates:</strong> Deployed applications built to robust specifications alongside premium, lightweight pre-built layouts.",
                "<strong>No-Framework Speed:</strong> Hand-crafted templates written in vanilla HTML5, CSS3, and ES6 JavaScript for instant loading and zero server overhead.",
                "<strong>Modern Deployments:</strong> Fully integrated React 19, TypeScript, Firestore, and Google OAuth configurations for campus-wide platforms."
            ],
            "technical-support": [
                "<strong>Enterprise Hardening:</strong> Tailored OS installations (Ubuntu Desktop LTS & Pro) configured for compliance and workstation hardening.",
                "<strong>Clean Windows Fleets:</strong> Deployment and debloating of Windows Enterprise LTSC or Personal Pro versions, fully optimized for performance.",
                "<strong>Precision Rigging:</strong> Custom controller configurations and graphics pipeline optimization (RetroArch/PCSX2) on Windows rigs."
            ],
            "operations-cases": [
                "<strong>Verified Cases:</strong> Real-world operating system setups and retro console configurations executed for active clients.",
                "<strong>Direct Feedback:</strong> Verified testimonials outlining system stability, emulation speeds, and workstation security.",
                "<strong>Configuration Logs:</strong> Absolute transparency with detailed technical challenges, solutions, and project impacts."
            ],
            "consulting": [
                "<strong>Pathway Assessments:</strong> Detailed objective analysis comparing corporate SDE careers with postgraduate IIT academic pathways.",
                "<strong>Hackathon Mentorship:</strong> Pair programming, prototype development sprints, and version control orchestration."
            ]
        };

        const SEARCH_PLACEHOLDERS = {
            "production": "Search applications...",
            "ui-ux": "Search templates...",
            "technical-support": "Search support offerings...",
            "operations-cases": "Search case studies...",
            "consulting": "Search advisory logs..."
        };

        const CATEGORY_FILTERS = {
            "production": [],
            "operations-cases": [],
            "ui-ux": [
                { label: "All Templates", tag: "all" },
                { label: "Finance / Corporate", tag: "finance" },
                { label: "Education", tag: "education" },
                { label: "Real Estate", tag: "real-estate" },
                { label: "Design / Interiors", tag: "interiors" }
            ],
            "technical-support": [
                { label: "All Services", tag: "all" },
                { label: "Linux Desktop", tag: "linux" },
                { label: "Windows OS", tag: "windows" },
                { label: "Gaming Emulation", tag: "emulation" }
            ],
            "consulting": [
                { label: "All Advisory", tag: "all" },
                { label: "Career Strategy", tag: "career" },
                { label: "Hackathon Sprints", tag: "hackathon" }
            ]
        };

        let allLoadedProjects = [];
        let activeFilterTag = 'all';
        let activeSearchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            loadProjectsData();
        });

        async function loadProjectsData() {
            const params = new URLSearchParams(window.location.search);
            const categoryId = params.get('category');
            
            const titleEl = document.getElementById('category-title');
            const descEl = document.getElementById('category-description');
            const breadcrumbEl = document.getElementById('breadcrumb-current');
            
            const loadingEl = document.getElementById('projects-loading');
            const errorEl = document.getElementById('projects-error');
            const hubEl = document.getElementById('category-hub');
            const showcaseWrapper = document.getElementById('showcase-content-wrapper');
            const productionPromo = document.getElementById('production-promo-container');
            
            if (!categoryId) {
                showError();
                return;
            }

            try {
                const response = await fetch('projects/projects.json');
                if (!response.ok) throw new Error('Failed to fetch project database');
                
                const data = await response.json();
                const category = data.categories[categoryId];
                
                if (!category) {
                    showError();
                    return;
                }

                // Set Header Information
                titleEl.textContent = category.title;
                descEl.textContent = category.description;
                breadcrumbEl.textContent = category.title;
                document.title = `${category.title} | SaigoBits`;

                // Filter projects belonging to this category
                allLoadedProjects = data.projects.filter(p => p.category === categoryId);
                
                // Set up visual highlights, search placeholders, and dropdown options
                setupCategoryHub(categoryId);
                
                // Show dynamic promo banner based on categoryId
                if (categoryId === 'ui-ux') {
                    productionPromo.style.display = 'block';
                    document.getElementById('production-promo-card').innerHTML = `
                        <div class="promo-content">
                            <div class="status-badge">
                                <span class="pulse-dot"></span> Live Deployed
                            </div>
                            <h3>Production-Grade Applications</h3>
                            <p>Explore active, secure web portals and interactive computational platforms deployed in the real world with verified institutional user bases.</p>
                        </div>
                        <a href="projects.html?category=production" class="btn btn-primary">
                            View Deployed Apps
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; margin-left: 6px; vertical-align: middle;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </a>
                    `;
                } else if (categoryId === 'technical-support') {
                    productionPromo.style.display = 'block';
                    document.getElementById('production-promo-card').innerHTML = `
                        <div class="promo-content">
                            <div class="status-badge">
                                <span class="pulse-dot"></span> Verified Log
                            </div>
                            <h3>Verified Operations Case Studies</h3>
                            <p>Explore real-world operating system hardening, LTSC fleet deployment, and console emulation setups with verified client feedback.</p>
                        </div>
                        <a href="projects.html?category=operations-cases" class="btn btn-primary">
                            View Operational Cases
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px; margin-left: 6px; vertical-align: middle;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </a>
                    `;
                } else {
                    productionPromo.style.display = 'none';
                }

                if (allLoadedProjects.length === 0) {
                    document.getElementById('projects-list-container').innerHTML = '<p class="no-projects-msg">No projects listed under this category yet. Check back soon!</p>';
                } else {
                    filterAndRenderProjects();
                }

                // Toggle visibility
                loadingEl.style.display = 'none';
                hubEl.style.display = 'grid';
                showcaseWrapper.style.display = 'block';
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function setupCategoryHub(categoryId) {
            const highlightsEl = document.getElementById('hub-highlights');
            const searchInput = document.getElementById('project-search-input');
            const dropdownSelect = document.getElementById('category-dropdown');
            const dropdownContainer = document.getElementById('dropdown-select-container');
            
            // Set dynamic titles for secondary section
            const secTitleEl = document.getElementById('secondary-section-title');
            const secDescEl = document.getElementById('secondary-section-description');
            
            if (categoryId === 'ui-ux') {
                secTitleEl.textContent = 'Explore Premium Templates';
                secDescEl.textContent = 'Ready-to-go, conversion-focused landing pages and corporate layouts built in clean, framework-free stacks.';
            } else if (categoryId === 'technical-support') {
                secTitleEl.textContent = 'Explore Support & Hardening Services';
                secDescEl.textContent = 'High-reliability operating system installations, secure workstation setups, and media configs offered to optimize user environments.';
            } else if (categoryId === 'operations-cases') {
                secTitleEl.textContent = 'Verified Operations Case Studies';
                secDescEl.textContent = 'A log of real-world workstation hardening, Windows LTSC fleet deployments, and customized console setups executed for our clients.';
            } else if (categoryId === 'consulting') {
                secTitleEl.textContent = 'Strategic Advisory & Mentorship Cases';
                secDescEl.textContent = 'Real-world engineering pathway reviews, competitive hackathon co-sprints, and DSA prep roadmap guides.';
            } else if (categoryId === 'production') {
                secTitleEl.textContent = 'Production Deployed Solutions';
                secDescEl.textContent = 'Enterprise-grade, secure applications deployed in the real world with verified institutional user bases.';
            }

            // 1. Highlights list
            highlightsEl.innerHTML = '';
            const highlights = CATEGORY_HIGHLIGHTS[categoryId] || [];
            highlights.forEach(hl => {
                const li = document.createElement('li');
                li.innerHTML = hl;
                highlightsEl.appendChild(li);
            });
            
            // 2. Search Box Setup
            searchInput.placeholder = SEARCH_PLACEHOLDERS[categoryId] || "Search projects...";
            searchInput.value = '';
            activeSearchQuery = '';
            
            // Remove any old event listeners (by cloning the input)
            const newInput = searchInput.cloneNode(true);
            searchInput.parentNode.replaceChild(newInput, searchInput);
            
            newInput.addEventListener('input', (e) => {
                activeSearchQuery = e.target.value.toLowerCase().trim();
                filterAndRenderProjects();
            });
            
            // 3. Dynamic Dropdown Selector
            const filters = CATEGORY_FILTERS[categoryId] || [];
            if (filters.length === 0) {
                dropdownContainer.style.display = 'none';
                activeFilterTag = 'all';
            } else {
                dropdownContainer.style.display = 'block';
                
                // Clone dropdown to clear previous change listeners
                const newDropdown = dropdownSelect.cloneNode(true);
                dropdownSelect.parentNode.replaceChild(newDropdown, dropdownSelect);
                
                newDropdown.innerHTML = '';
                filters.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.tag;
                    opt.textContent = f.label;
                    newDropdown.appendChild(opt);
                });
                
                newDropdown.selectedIndex = 0;
                activeFilterTag = newDropdown.value;
                
                newDropdown.addEventListener('change', (e) => {
                    activeFilterTag = e.target.value;
                    filterAndRenderProjects();
                });
            }
        }

        function projectMatchesTag(proj, tag) {
            if (tag === 'all') return true;
            
            const id = proj.id;
            
            if (tag === 'finance') {
                return id === 'ca-firm-template' || id === 'iw-associates-template';
            }
            if (tag === 'education') {
                return id === 'coaching-template';
            }
            if (tag === 'real-estate') {
                return id === 'real-estate-template';
            }
            if (tag === 'interiors') {
                return id === 'probox-template';
            }
            if (tag === 'linux') {
                return id === 'ubuntu-setup' || id === 'ubuntu-pro-setup' || id === 'ubuntu-hardening-service';
            }
            if (tag === 'windows') {
                return id === 'windows-personal-setup' || id === 'windows-setup-service';
            }
            if (tag === 'emulation') {
                return id === 'retro-gaming-setup' || id === 'ps2-emulation-setup' || id === 'emulation-setup-service';
            }
            if (tag === 'career') {
                return id === 'iit-pathway-advisory' || id === 'evertz-placement-advisory';
            }
            if (tag === 'hackathon') {
                return id === 'hackathon-engineering-mentorship';
            }
            return false;
        }

        function filterAndRenderProjects() {
            const listContainerEl = document.getElementById('projects-list-container');
            const categoryId = new URLSearchParams(window.location.search).get('category');
            
            // For ui-ux (Websites), filter only templates. For other categories, filter all projects.
            const baseProjects = categoryId === 'ui-ux'
                ? allLoadedProjects.filter(p => p.type === 'template')
                : allLoadedProjects;
            
            const filtered = baseProjects.filter(proj => {
                const matchesTag = projectMatchesTag(proj, activeFilterTag);
                
                let matchesSearch = true;
                if (activeSearchQuery) {
                    const title = (proj.title || '').toLowerCase();
                    const challenge = (proj.challenge || '').toLowerCase();
                    const solution = (proj.solution || '').toLowerCase();
                    const outcome = (proj.outcome || '').toLowerCase();
                    
                    matchesSearch = title.includes(activeSearchQuery) || 
                                    challenge.includes(activeSearchQuery) || 
                                    solution.includes(activeSearchQuery) || 
                                    outcome.includes(activeSearchQuery);
                }
                
                return matchesTag && matchesSearch;
            });
            
            if (filtered.length === 0) {
                listContainerEl.innerHTML = '<p class="no-projects-msg">No matching case studies or templates found.</p>';
            } else {
                renderProjects(filtered, listContainerEl);
            }
        }

        function showError() {
            document.getElementById('projects-loading').style.display = 'none';
            document.getElementById('category-hub').style.display = 'none';
            document.getElementById('projects-error').style.display = 'block';
            document.getElementById('category-title').textContent = 'Error';
            document.getElementById('category-description').textContent = '';
        }

        function renderProjects(projects, container) {
            container.innerHTML = '';
            
            projects.forEach((proj, idx) => {
                const card = document.createElement('article');
                card.className = 'project-detail-card';
                card.id = `project-detail-${idx + 1}`;
                
                // Construct client verification section
                let clientHTML = '';
                let hasShowAll = false;
                let namesList = [];
                
                if (proj.client) {
                    const names = proj.client.names || (proj.client.name ? [proj.client.name] : []);
                    namesList = names;
                    const title = proj.client.title || '';
                    
                    let namesStr = '';
                    let showAllButton = '';
                    
                    if (names.length <= 3) {
                        namesStr = names.join(', ');
                    } else {
                        namesStr = `${names.slice(0, 3).join(', ')} and ${names.length - 3} others`;
                        showAllButton = `
                            <button class="show-all-clients-btn" type="button">
                                Show All
                            </button>
                        `;
                        hasShowAll = true;
                    }
                    
                    clientHTML = `
                        <div class="project-client-info">
                            <span class="client-label">Consulted Client${names.length > 1 ? 's' : ''}:</span>
                            <span class="client-name">${namesStr}</span>
                            ${showAllButton}
                            ${title ? `<span class="client-title">${title}</span>` : ''}
                        </div>
                    `;
                }

                // Construct live demo button if demoPath is set
                let demoHTML = '';
                if (proj.demoPath) {
                    const btnText = proj.type === 'production' ? 'Launch Live Application' : 'Launch Live Demo';
                    demoHTML = `
                        <div class="project-demo-action">
                            <a href="${encodeURI(proj.demoPath)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary demo-btn">
                                ${btnText}
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-left: 6px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </a>
                        </div>
                    `;
                }

                // Construct feedback section
                let feedbackHTML = '';
                if (proj.feedback) {
                    feedbackHTML = `
                        <div class="project-feedback-wrapper">
                            <span class="feedback-label">Client Feedback:</span>
                            <blockquote class="client-quote">
                                "${proj.feedback}"
                            </blockquote>
                        </div>
                    `;
                }

                let badgeHTML = '';
                if (proj.type === 'production') {
                    badgeHTML = `
                        <div class="status-badge">
                            <span class="pulse-dot"></span> Live Deployed
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="project-detail-main">
                        <div class="project-detail-header">
                            <div>
                                ${badgeHTML}
                                <h2>${proj.title}</h2>
                            </div>
                            <span class="project-number-badge">Case #${idx + 1}</span>
                        </div>
                        
                        <div class="project-detail-body">
                            <div class="project-detail-section">
                                <h4 class="label-challenge">Challenge</h4>
                                <p>${proj.challenge}</p>
                            </div>
                            
                            <div class="project-detail-section">
                                <h4 class="label-solution">Solution & Strategy</h4>
                                <p>${proj.solution}</p>
                            </div>
                            
                            <div class="project-detail-section">
                                <h4 class="label-outcome">Outcome & Impact</h4>
                                <p>${proj.outcome}</p>
                            </div>
                        </div>
                        
                        <div class="project-detail-footer">
                            ${clientHTML}
                            ${demoHTML}
                            ${feedbackHTML}
                        </div>
                    </div>
                    <div class="project-detail-visual">
                        ${getProjectVisual(proj.id)}
                    </div>
                `;
                
                if (hasShowAll) {
                    const btn = card.querySelector('.show-all-clients-btn');
                    if (btn) {
                        btn.addEventListener('click', () => {
                            openClientsModal(namesList);
                        });
                    }
                }
                
                container.appendChild(card);
            });
        }

        function getProjectVisual(projId) {
            const svgAttrs = 'viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"';
            
            switch (projId) {
                case 'automata-toolkit':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-automata" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ebf8fa"/>
                                    <stop offset="100%" stop-color="#c5f0f5"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-automata)"/>
                            <!-- Start Arrow -->
                            <path d="M15 100 H30" stroke="#202124" stroke-width="2.5" marker-end="url(#arrow)"/>
                            <!-- Nodes -->
                            <circle cx="50" cy="100" r="16" fill="#55efc4" stroke="#202124" stroke-width="2.5"/>
                            <text x="50" y="104" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" fill="#202124">q0</text>
                            
                            <circle cx="115" cy="100" r="16" fill="#7d5fff" stroke="#202124" stroke-width="2.5"/>
                            <text x="115" y="104" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">q1</text>
                            
                            <!-- Accept Node (Double Circle) -->
                            <circle cx="170" cy="100" r="16" fill="#ffd35c" stroke="#202124" stroke-width="2.5"/>
                            <circle cx="170" cy="100" r="12" fill="none" stroke="#202124" stroke-width="1.5"/>
                            <text x="170" y="104" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" fill="#202124">q2</text>
                            
                            <!-- Transitions -->
                            <path d="M66 100 H99" fill="none" stroke="#202124" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M95 95 L99 100 L95 105" fill="none" stroke="#202124" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            
                            <path d="M131 100 H154" fill="none" stroke="#202124" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M150 95 L154 100 L150 105" fill="none" stroke="#202124" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            
                            <!-- Self Loop on q1 -->
                            <path d="M107 85 C107 70 123 70 123 85" fill="none" stroke="#202124" stroke-width="2" stroke-linecap="round"/>
                            <path d="M120 83 L123 85 L125 80" fill="none" stroke="#202124" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    `;
                case 'iit-exchange':
                    return `
                        <svg ${svgAttrs}>
                            <defs>
                                <linearGradient id="grad-exchange" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#fff5eb"/>
                                    <stop offset="100%" stop-color="#ffe2c5"/>
                                </linearGradient>
                            </defs>
                            <rect width="200" height="200" rx="16" fill="url(#grad-exchange)"/>
                            <!-- Marketplace Card representation -->
                            <rect x="45" y="45" width="110" height="110" rx="12" fill="#ffffff" stroke="#202124" stroke-width="3"/>
                            
                            <!-- Image Box inside card -->

    <!-- Modal for displaying long lists of clients -->
    <div id="clients-modal" class="clients-modal" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
        <div class="clients-modal-content">
            <div class="clients-modal-header">
                <h3 id="modal-title">All Verified Clients</h3>
                <button class="clients-modal-close" onclick="closeClientsModal()" aria-label="Close modal">&times;</button>
            </div>
            <div class="clients-modal-list" id="clients-modal-list">
                <!-- Client names will load here -->
            </div>
        </div>
    </div>

    <script>
        function openClientsModal(names) {
            const modal = document.getElementById('clients-modal');
            const list = document.getElementById('clients-modal-list');
            list.innerHTML = '';
            
            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'client-modal-item';
                item.textContent = name;
                list.appendChild(item);
            });
            
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            
            // Set focus to close button for accessibility
            const closeBtn = modal.querySelector('.clients-modal-close');
            if (closeBtn) closeBtn.focus();
        }

        function closeClientsModal() {
            const modal = document.getElementById('clients-modal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        // Close modal on click outside content
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('clients-modal');
            if (e.target === modal) {
                closeClientsModal();
            }
        });

        // Close modal on escape key press (Enterprise A11y standard)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('clients-modal');
                if (modal.classList.contains('open')) {
                    closeClientsModal();
                }
            }
        });
    </script>
